name: PR Automation with Codegen

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Auto-label PRs based on files changed
  auto-label:
    name: Auto Label PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto Label PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            
            // Get changed files
            const { data: files } = await github.rest.pulls.listFiles({
              owner,
              repo,
              pull_number: pr_number
            });
            
            const labels = new Set();
            
            // Define label rules based on file patterns
            const labelRules = {
              'frontend': /^upload\/catalog\/(view|controller)/,
              'backend': /^upload\/admin\/(view|controller|model)/,
              'api': /api|rest/i,
              'database': /\.sql$|migration|schema/i,
              'docker': /^docker\/|dockerfile|docker-compose/i,
              'documentation': /\.md$|docs\//i,
              'security': /security|auth|login|password/i,
              'performance': /cache|optimization|performance/i,
              'extension': /^upload\/extension\//,
              'theme': /template|stylesheet|css|scss|js$/,
              'config': /config|\.env|\.yml$|\.yaml$/,
              'tests': /test|spec/i,
              'ci/cd': /\.github\/workflows/,
              'dependencies': /composer\.|package\./
            };
            
            // Check each file against label rules
            files.forEach(file => {
              Object.entries(labelRules).forEach(([label, pattern]) => {
                if (pattern.test(file.filename)) {
                  labels.add(label);
                }
              });
            });
            
            // Add size labels
            const changedLines = files.reduce((sum, file) => sum + file.changes, 0);
            if (changedLines < 10) labels.add('size/XS');
            else if (changedLines < 30) labels.add('size/S');
            else if (changedLines < 100) labels.add('size/M');
            else if (changedLines < 500) labels.add('size/L');
            else labels.add('size/XL');
            
            // Apply labels
            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr_number,
                labels: Array.from(labels)
              });
            }

  # PR Quality Check
  pr-quality-check:
    name: PR Quality Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/composer/files
            ./.cache
            ./.php-cs-fixer.cache
          key: php-8.4-${{ hashFiles('**/composer.lock') }}

      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Run Security Scan
        run: |
          echo "🔍 Running security scan..."
          # Check for common security issues
          if grep -r "eval(" upload/ --include="*.php" | grep -v vendor; then
            echo "❌ Found eval() usage - potential security risk"
            exit 1
          fi
          
          if grep -r "\$_GET\[" upload/ --include="*.php" | grep -v "htmlspecialchars\|filter_input" | head -5; then
            echo "⚠️  Found direct \$_GET usage without sanitization"
          fi
          
          if grep -r "mysql_" upload/ --include="*.php"; then
            echo "❌ Found deprecated mysql_ functions"
            exit 1
          fi
          
          echo "✅ Security scan completed"

      - name: Check Code Quality
        run: |
          echo "📊 Running code quality checks..."
          
          # Run PHPStan
          php tools/phpstan.phar analyze --no-progress --error-format=github
          
          # Check for TODO/FIXME comments
          if grep -r "TODO\|FIXME\|XXX" upload/ --include="*.php" | wc -l | awk '{if($1>10) exit 1}'; then
            echo "⚠️  High number of TODO/FIXME comments found"
          fi
          
          echo "✅ Code quality check completed"

      - name: Performance Check
        run: |
          echo "⚡ Running performance checks..."
          
          # Check for potential performance issues
          if grep -r "SELECT \*" upload/ --include="*.php" | wc -l | awk '{if($1>5) exit 1}'; then
            echo "⚠️  Multiple SELECT * queries found - consider optimizing"
          fi
          
          # Check for N+1 query patterns
          if grep -r "foreach.*query\|while.*query" upload/ --include="*.php" | wc -l | awk '{if($1>3) exit 1}'; then
            echo "⚠️  Potential N+1 query patterns detected"
          fi
          
          echo "✅ Performance check completed"

  # Auto-assign reviewers
  auto-assign-reviewers:
    name: Auto Assign Reviewers
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Auto Assign Reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;
            
            // Define team members and their expertise
            const reviewers = {
              'backend': ['backend-expert-1', 'backend-expert-2'],
              'frontend': ['frontend-expert-1', 'frontend-expert-2'],
              'security': ['security-expert'],
              'devops': ['devops-expert']
            };
            
            // Get PR labels to determine appropriate reviewers
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner,
              repo,
              issue_number: pr_number
            });
            
            const assignedReviewers = new Set();
            
            labels.forEach(label => {
              if (reviewers[label.name]) {
                reviewers[label.name].forEach(reviewer => {
                  if (reviewer !== author) {
                    assignedReviewers.add(reviewer);
                  }
                });
              }
            });
            
            // Always assign at least one reviewer
            if (assignedReviewers.size === 0) {
              assignedReviewers.add('default-reviewer');
            }
            
            // Assign reviewers (limit to 3)
            const reviewersArray = Array.from(assignedReviewers).slice(0, 3);
            
            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number: pr_number,
                reviewers: reviewersArray
              });
            } catch (error) {
              console.log('Could not assign reviewers:', error.message);
            }

  # Codegen AI Review
  codegen-review:
    name: Codegen AI Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI Code Review
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            
            // Get PR diff
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pr_number
            });
            
            // Get changed files
            const { data: files } = await github.rest.pulls.listFiles({
              owner,
              repo,
              pull_number: pr_number
            });
            
            let reviewComments = [];
            
            // Analyze each changed file
            for (const file of files) {
              if (file.filename.endsWith('.php')) {
                // Check for common issues
                const patch = file.patch || '';
                
                // Check for security issues
                if (patch.includes('$_GET') || patch.includes('$_POST')) {
                  reviewComments.push({
                    path: file.filename,
                    body: '🔒 **Security Review**: Direct superglobal usage detected. Consider using `filter_input()` or proper validation.',
                    line: 1
                  });
                }
                
                // Check for performance issues
                if (patch.includes('SELECT *')) {
                  reviewComments.push({
                    path: file.filename,
                    body: '⚡ **Performance**: Avoid `SELECT *` queries. Specify only needed columns.',
                    line: 1
                  });
                }
                
                // Check for code style
                if (patch.includes('var_dump') || patch.includes('print_r')) {
                  reviewComments.push({
                    path: file.filename,
                    body: '🧹 **Code Quality**: Debug statements found. Remove before merging.',
                    line: 1
                  });
                }
              }
            }
            
            // Post review comments
            if (reviewComments.length > 0) {
              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number: pr_number,
                body: '🤖 **AI Code Review Summary**\n\nI found some areas for improvement in this PR. Please review the inline comments.',
                event: 'COMMENT',
                comments: reviewComments.slice(0, 10) // Limit to 10 comments
              });
            } else {
              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number: pr_number,
                body: '🤖 **AI Code Review**: No major issues detected. Code looks good! ✅',
                event: 'COMMENT'
              });
            }

  # Auto-merge for dependabot
  auto-merge-dependabot:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}