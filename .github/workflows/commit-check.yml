name: Commit Validation

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  validate-commits:
    name: Validate Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Commit Messages
        run: |
          echo "📝 Validating commit messages..."
          
          # This is a basic validation that checks if commits exist
          commit_count=$(git rev-list --count HEAD)
          
          if [ "$commit_count" -gt 0 ]; then
            echo "✅ Repository has $commit_count commits"
            
            # Show recent commits
            echo "Recent commits:"
            git log --oneline -5 || echo "Could not show commit log"
            
            echo "✅ Commit validation completed"
          else
            echo "ℹ️  No commits found to validate"
          fi