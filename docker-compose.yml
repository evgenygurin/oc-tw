services:
  mariadb:
    image: mariadb:11.3
    container_name: opencart_mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - opencart_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  opencart:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencart_app
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_HOSTNAME: mariadb
      DB_USERNAME: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      DB_DATABASE: ${MARIADB_DATABASE}
      DB_PORT: 3306
      DB_PREFIX: oc_
    volumes:
      - ./system/storage:/var/www/html/system/storage
      - ./image:/var/www/html/image
      - ./theme/oc-astro:/var/www/html/catalog/view/theme/oc-astro
    ports:
      - "8080:80"
    networks:
      - opencart_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  phpmyadmin:
    image: phpmyadmin
    container_name: opencart_phpmyadmin
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_USER: ${MARIADB_USER}
      PMA_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "8081:80"
    networks:
      - opencart_network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: opencart_mailhog
    ports:
      - "8025:8025"  # Web interface
      - "1025:1025"  # SMTP server
    networks:
      - opencart_network

volumes:
  mariadb_data:

networks:
  opencart_network:
    driver: bridge
