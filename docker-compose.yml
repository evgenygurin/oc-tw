services:
  mariadb:
    image: docker.io/bitnami/mariadb:latest
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD:-rootpassword}
      - MARIADB_USER=${MARIADB_USER:-bn_opencart}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD:-opencart}
      - MARIADB_DATABASE=${MARIADB_DATABASE:-bitnami_opencart}
    volumes:
      - mariadb_data:/bitnami/mariadb
    healthcheck:
      test: ["CMD", "bash", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  opencart:
    build:
      context: .
      dockerfile: Dockerfile.opencart
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8080:80"   # HTTP
    environment:
      - DB_HOSTNAME=mariadb
      - DB_USERNAME=${MARIADB_USER:-bn_opencart}
      - DB_PASSWORD=${MARIADB_PASSWORD:-opencart}
      - DB_DATABASE=${MARIADB_DATABASE:-bitnami_opencart}
      - DB_PORT=3306
      - DB_PREFIX=oc_
    volumes:
      - opencart_data:/var/www/html
      # Bind mount for custom theme development (optional)
      - ./theme/oc-astro:/var/www/html/catalog/view/theme/oc-astro

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      - PMA_HOST=mariadb
      - PMA_PORT=3306
    ports:
      - "8081:80"

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "8025:8025"   # UI http://localhost:8025

volumes:
  mariadb_data:
  opencart_data:
