name: Lint

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Lint PHP Files
        run: |
          echo "🔍 Checking PHP syntax..."
          if find upload -type f -name "*.php" ! -path 'upload/system/storage/vendor/*' -print0 2>/dev/null | xargs -0 -I {} php -l {} 2>&1 | grep -q "Errors parsing"; then
            echo "❌ Syntax errors were found."
            find upload -type f -name "*.php" ! -path 'upload/system/storage/vendor/*' -exec php -l {} \; | grep -B1 "Errors parsing" || true
            exit 1
          else
            echo "✅ No syntax errors were detected."
          fi

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/composer/files
            ./.cache
            ./.php-cs-fixer.cache
          key: ${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-
            ${{ runner.os }}-php-

      - name: Install Dependencies
        run: |
          if [ -f "composer.json" ]; then
            echo "📦 Installing Composer dependencies..."
            composer install --no-dev --optimize-autoloader
          else
            echo "ℹ️  No composer.json found, skipping dependency installation"
          fi

      - name: Check Code Style
        if: matrix.php == '8.4'
        run: |
          if [ -f "tools/php-cs-fixer.phar" ]; then
            echo "🎨 Checking code style..."
            php tools/php-cs-fixer.phar fix --dry-run --diff --ansi || echo "⚠️  Code style issues found (non-blocking)"
          else
            echo "ℹ️  PHP-CS-Fixer not found, skipping code style check"
          fi

      - name: Run PHPStan
        if: matrix.php == '8.4'
        run: |
          if [ -f "tools/phpstan.phar" ]; then
            echo "📊 Running PHPStan analysis..."
            php tools/phpstan.phar analyze --no-progress || echo "⚠️  PHPStan issues found (non-blocking)"
          else
            echo "ℹ️  PHPStan not found, skipping static analysis"
          fi

      - name: Validation Summary
        run: |
          echo "✅ Lint job completed for PHP ${{ matrix.php }}"
          echo "ℹ️  All critical checks have passed"
