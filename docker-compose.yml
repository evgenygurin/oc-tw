version: "3.8"

services:
  mariadb:
    image: docker.io/bitnami/mariadb:11.3
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD:-rootpassword}
      - MARIADB_USER=${MARIADB_USER:-bn_opencart}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD:-opencart}
      - MARIADB_DATABASE=${MARIADB_DATABASE:-bitnami_opencart}
    volumes:
      - mariadb_data:/bitnami/mariadb
    healthcheck:
      test: ["CMD", "bash", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  opencart:
    image: docker.io/bitnami/opencart-archived:latest
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8080:8080"   # HTTP
      - "8443:8443"   # HTTPS
    environment:
      - OPENCART_HOST=${OPENCART_HOST:-localhost}
      - OPENCART_USERNAME=${OPENCART_USERNAME:-admin}
      - OPENCART_PASSWORD=${OPENCART_PASSWORD:-admin123}
      - OPENCART_EMAIL=${OPENCART_EMAIL:-admin@example.com}
      - MARIADB_HOST=mariadb
      - MARIADB_PORT_NUMBER=3306
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD:-rootpassword}
      - MARIADB_DATABASE=${MARIADB_DATABASE:-bitnami_opencart}
      - MARIADB_USER=${MARIADB_USER:-bn_opencart}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD:-opencart}
      # Optional: configure SMTP to test emails via MailHog
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_USER=
      - SMTP_PASSWORD=
    volumes:
      - opencart_data:/bitnami/opencart
      # Bind mount for custom theme development (optional)
      - ./theme/oc-astro:/bitnami/opencart/catalog/view/theme/oc-astro

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      - PMA_HOST=mariadb
      - PMA_PORT=3306
    ports:
      - "8081:80"

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "8025:8025"   # UI http://localhost:8025

volumes:
  mariadb_data:
  opencart_data:
