name: Codegen AI Integration

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # AI-powered code analysis
  ai-code-analysis:
    name: AI Code Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install Dependencies
        run: composer install --no-dev

      - name: AI Architecture Review
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Get PR details
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            
            // Get changed files
            const { data: files } = await github.rest.pulls.listFiles({
              owner,
              repo,
              pull_number: pr_number
            });
            
            let architectureIssues = [];
            let suggestions = [];
            
            // Analyze architecture patterns
            for (const file of files) {
              if (file.filename.endsWith('.php')) {
                try {
                  // Read file content if it exists
                  if (fs.existsSync(file.filename)) {
                    const content = fs.readFileSync(file.filename, 'utf8');
                    
                    // Check MVC patterns
                    if (file.filename.includes('/controller/') && !content.includes('class') && !content.includes('Controller')) {
                      architectureIssues.push(`❌ **${file.filename}**: Controller should follow naming convention and extend Controller class`);
                    }
                    
                    if (file.filename.includes('/model/') && !content.includes('class') && !content.includes('Model')) {
                      architectureIssues.push(`❌ **${file.filename}**: Model should follow naming convention and extend Model class`);
                    }
                    
                    // Check for proper namespacing
                    if (!content.includes('namespace') && file.filename.includes('upload/')) {
                      suggestions.push(`💡 **${file.filename}**: Consider adding proper namespace declaration`);
                    }
                    
                    // Check for dependency injection
                    if (content.includes('new ') && !content.includes('$this->registry')) {
                      suggestions.push(`💡 **${file.filename}**: Consider using dependency injection instead of direct instantiation`);
                    }
                    
                    // Check for proper error handling
                    if (content.includes('mysql_') || content.includes('mysqli_') && !content.includes('try')) {
                      architectureIssues.push(`❌ **${file.filename}**: Database operations should include proper error handling`);
                    }
                  }
                } catch (error) {
                  console.log(`Could not analyze ${file.filename}: ${error.message}`);
                }
              }
            }
            
            // Create review comment
            let reviewBody = '🤖 **AI Architecture Review**\n\n';
            
            if (architectureIssues.length > 0) {
              reviewBody += '## 🚨 Architecture Issues\n\n';
              reviewBody += architectureIssues.join('\n') + '\n\n';
            }
            
            if (suggestions.length > 0) {
              reviewBody += '## 💡 Suggestions\n\n';
              reviewBody += suggestions.join('\n') + '\n\n';
            }
            
            if (architectureIssues.length === 0 && suggestions.length === 0) {
              reviewBody += '✅ **No architecture issues detected!** Code follows OpenCart patterns well.\n\n';
            }
            
            reviewBody += '---\n*This review was generated by Codegen AI*';
            
            // Post review
            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number: pr_number,
              body: reviewBody,
              event: 'COMMENT'
            });

  # AI-powered documentation generation
  ai-documentation:
    name: AI Documentation Generator
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Documentation
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Get changed files
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            
            const { data: files } = await github.rest.pulls.listFiles({
              owner,
              repo,
              pull_number: pr_number
            });
            
            let newFeatures = [];
            let changedAPIs = [];
            
            // Analyze changes for documentation updates
            for (const file of files) {
              if (file.filename.endsWith('.php') && file.status === 'added') {
                // New PHP files might be new features
                if (file.filename.includes('/controller/') || file.filename.includes('/model/')) {
                  newFeatures.push(file.filename);
                }
              }
              
              if (file.filename.includes('api/') || file.filename.includes('rest/')) {
                changedAPIs.push(file.filename);
              }
            }
            
            // Generate documentation updates
            let docUpdates = [];
            
            if (newFeatures.length > 0) {
              docUpdates.push('## 🆕 New Features\n\n');
              newFeatures.forEach(feature => {
                const featureName = path.basename(feature, '.php');
                docUpdates.push(`- **${featureName}**: Added new functionality\n`);
              });
              docUpdates.push('\n');
            }
            
            if (changedAPIs.length > 0) {
              docUpdates.push('## 🔄 API Changes\n\n');
              changedAPIs.forEach(api => {
                docUpdates.push(`- Modified: \`${api}\`\n`);
              });
              docUpdates.push('\n');
            }
            
            // Update CHANGELOG if there are significant changes
            if (docUpdates.length > 0) {
              const changelogPath = 'CHANGELOG.md';
              let changelog = '';
              
              if (fs.existsSync(changelogPath)) {
                changelog = fs.readFileSync(changelogPath, 'utf8');
              } else {
                changelog = '# Changelog\n\nAll notable changes to this project will be documented in this file.\n\n';
              }
              
              const today = new Date().toISOString().split('T')[0];
              const newEntry = `## [Unreleased] - ${today}\n\n${docUpdates.join('')}\n`;
              
              // Insert after the header
              const lines = changelog.split('\n');
              const insertIndex = lines.findIndex(line => line.startsWith('## ')) || 3;
              lines.splice(insertIndex, 0, newEntry);
              
              fs.writeFileSync(changelogPath, lines.join('\n'));
              
              // Commit the changes
              const { execSync } = require('child_process');
              try {
                execSync('git config user.name "Codegen AI"');
                execSync('git config user.email "codegen@ai.com"');
                execSync('git add CHANGELOG.md');
                execSync('git commit -m "docs: Auto-update changelog [skip ci]"');
                execSync('git push');
              } catch (error) {
                console.log('Could not commit changelog updates:', error.message);
              }
            }

  # AI-powered test generation
  ai-test-generation:
    name: AI Test Generator
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Tests
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Get changed files
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            
            const { data: files } = await github.rest.pulls.listFiles({
              owner,
              repo,
              pull_number: pr_number
            });
            
            let testSuggestions = [];
            
            // Analyze files that might need tests
            for (const file of files) {
              if (file.filename.endsWith('.php') && 
                  (file.filename.includes('/controller/') || 
                   file.filename.includes('/model/') || 
                   file.filename.includes('/helper/'))) {
                
                const testPath = file.filename.replace('upload/', 'tests/')
                                             .replace('.php', 'Test.php');
                
                if (!fs.existsSync(testPath)) {
                  testSuggestions.push({
                    file: file.filename,
                    testFile: testPath,
                    type: file.filename.includes('/controller/') ? 'Controller' : 
                          file.filename.includes('/model/') ? 'Model' : 'Helper'
                  });
                }
              }
            }
            
            // Generate test suggestions comment
            if (testSuggestions.length > 0) {
              let comment = '🧪 **AI Test Generation Suggestions**\n\n';
              comment += 'The following files might benefit from unit tests:\n\n';
              
              testSuggestions.forEach(suggestion => {
                comment += `- **${suggestion.file}** → \`${suggestion.testFile}\`\n`;
                comment += `  - Type: ${suggestion.type} Test\n`;
                comment += `  - Consider testing: public methods, error handling, edge cases\n\n`;
              });
              
              comment += '💡 **Test Template Example:**\n\n';
              comment += '```php\n';
              comment += '<?php\n';
              comment += 'use PHPUnit\\Framework\\TestCase;\n\n';
              comment += 'class ExampleTest extends TestCase {\n';
              comment += '    public function testExample() {\n';
              comment += '        $this->assertTrue(true);\n';
              comment += '    }\n';
              comment += '}\n';
              comment += '```\n\n';
              comment += '---\n*Generated by Codegen AI*';
              
              // Post comment
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr_number,
                body: comment
              });
            }

  # Daily AI health check
  ai-health-check:
    name: AI Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install Dependencies
        run: composer install --no-dev

      - name: Run Health Checks
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            
            let healthIssues = [];
            
            try {
              // Check for security vulnerabilities
              const securityScan = execSync('grep -r "eval\\|exec\\|system\\|shell_exec" upload/ --include="*.php" | wc -l', { encoding: 'utf8' });
              if (parseInt(securityScan.trim()) > 0) {
                healthIssues.push('🔒 Security: Found potentially dangerous functions');
              }
              
              // Check for performance issues
              const performanceScan = execSync('grep -r "SELECT \\*" upload/ --include="*.php" | wc -l', { encoding: 'utf8' });
              if (parseInt(performanceScan.trim()) > 10) {
                healthIssues.push('⚡ Performance: High number of SELECT * queries detected');
              }
              
              // Check for deprecated PHP functions
              const deprecatedScan = execSync('grep -r "mysql_\\|ereg\\|split" upload/ --include="*.php" | wc -l', { encoding: 'utf8' });
              if (parseInt(deprecatedScan.trim()) > 0) {
                healthIssues.push('⚠️ Compatibility: Deprecated PHP functions found');
              }
              
              // Check code quality with PHPStan
              try {
                execSync('php tools/phpstan.phar analyze --no-progress --error-format=raw', { encoding: 'utf8' });
              } catch (error) {
                if (error.stdout && error.stdout.includes('errors')) {
                  healthIssues.push('📊 Code Quality: PHPStan found issues');
                }
              }
              
            } catch (error) {
              console.log('Health check error:', error.message);
            }
            
            // Create issue if problems found
            if (healthIssues.length > 0) {
              const { owner, repo } = context.repo;
              
              const issueBody = `🤖 **Daily AI Health Check Report**
              
**Issues Found:**
${healthIssues.map(issue => `- ${issue}`).join('\n')}

**Recommendations:**
- Review and address the identified issues
- Run local tests before pushing changes
- Consider refactoring problematic code sections

**Next Steps:**
1. Investigate each issue category
2. Create targeted PRs to fix issues
3. Update coding guidelines if needed

---
*This report was generated automatically by Codegen AI*
*Date: ${new Date().toISOString().split('T')[0]}*`;

              await github.rest.issues.create({
                owner,
                repo,
                title: `🤖 Daily Health Check - ${new Date().toISOString().split('T')[0]}`,
                body: issueBody,
                labels: ['ai-generated', 'health-check', 'maintenance']
              });
            }