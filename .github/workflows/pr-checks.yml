name: PR Quality Checks

on:
  pull_request_target:
    branches: [ main, develop, codegen-bot/initial-setup ]
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  docker-validation:
    name: Docker Services Health
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Create .env file
        run: |
          cp .env.example .env
          sed -i 's/your_secure_root_password/test_password_123/g' .env
          sed -i 's/your_secure_password/test_db_pass_456/g' .env

      - name: Start Docker services
        run: docker compose up -d

      - name: Wait for services to start
        run: |
          echo "Waiting for services to initialize..."
          sleep 60
          
          # Wait specifically for MariaDB to be healthy
          echo "Waiting for MariaDB to be healthy..."
          for i in {1..30}; do
            if docker compose ps mariadb | grep -q "healthy"; then
              echo "✅ MariaDB is healthy"
              break
            fi
            echo "Waiting for MariaDB... ($i/30)"
            sleep 5
          done

      - name: Check services status
        run: |
          echo "=== Docker Compose Services Status ==="
          docker compose ps
          
          echo -e "\n=== Checking individual service health ==="
          
          # Check MariaDB
          if docker compose ps mariadb | grep -q "healthy"; then
            echo "✅ MariaDB: healthy"
          else
            echo "❌ MariaDB: not healthy"
            docker compose logs mariadb | tail -20
            exit 1
          fi
          
          # Check other services are running (don't require healthy status)
          if docker compose ps opencart | grep -q "Up"; then
            echo "✅ OpenCart: running"
          else
            echo "❌ OpenCart: not running"
            docker compose logs opencart | tail -20
            exit 1
          fi
          
          if docker compose ps phpmyadmin | grep -q "Up"; then
            echo "✅ phpMyAdmin: running"
          else
            echo "❌ phpMyAdmin: not running"
            docker compose logs phpmyadmin | tail -20
          fi
          
          if docker compose ps mailhog | grep -q "Up"; then
            echo "✅ MailHog: running"
          else
            echo "❌ MailHog: not running"
            docker compose logs mailhog | tail -20
          fi
          
          echo -e "\n✅ Core services are operational"

      - name: Cleanup
        if: always()
        run: docker compose down -v

  security-scan:
    name: Security Vulnerabilities
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check for secrets
        run: |
          # Scan filesystem for secrets (simpler approach)
          docker run --rm -v "${PWD}:/workdir" -w /workdir \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /workdir \
            --no-update \
            --github-actions \
            --exclude-paths /workdir/.git || echo "TruffleHog scan completed"

  pr-validation:
    name: PR Template Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            // Check if PR has description
            if (body.length < 50) {
              core.setFailed('PR description is too short. Please provide detailed description.');
              return;
            }

            // Check for WHY section
            if (!body.includes('**WHY:**')) {
              core.setFailed('PR must explain WHY the change was made. Expected format: **WHY:** followed by explanation.');
              return;
            }

            // Check for type classification
            const types = ['feat:', 'fix:', 'refactor:', 'style:', 'docs:', 'chore:', 'perf:'];
            const hasType = types.some(type => body.includes(`[x] \`${type}\``));

            if (!hasType) {
              core.setFailed('PR must have a type classification selected.');
              return;
            }

            core.info('✅ PR template properly filled');

      - name: Check branch naming
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if ! [[ "$BRANCH_NAME" =~ ^(feat|fix|refactor|style|docs|chore|perf|codegen-bot|cursor)/.+ ]]; then
            echo "❌ Branch name must follow pattern: type/description"
            echo "   Examples: feat/user-auth, fix/mobile-menu"
            echo "   Automated branches: codegen-bot/*, cursor/*"
            exit 1
          fi
          echo "✅ Branch name is valid: $BRANCH_NAME"

  commit-validation:
    name: Commit Message Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Validate commit messages  
        run: |
          # For pull_request_target events, we need to fetch the PR branch
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            git fetch origin ${{ github.event.pull_request.head.ref }}
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            echo "✅ Event type ${{ github.event_name }} - skipping validation"
            exit 0
          fi
          
          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: $HEAD_SHA"
          echo "Validating commits between ${BASE_SHA} and ${HEAD_SHA}"
          
          # Get commit messages between base and head
          COMMITS=$(git log --format=%s ${BASE_SHA}..${HEAD_SHA} || echo "")

          if [ -z "$COMMITS" ]; then
            echo "✅ No commits to validate"
            exit 0
          fi

          echo "Validating commits:"
          echo "$COMMITS" | while read -r msg; do
            if [ -z "$msg" ]; then
              continue
            fi
            echo "Checking: $msg"
            if ! [[ "$msg" =~ ^(feat|fix|refactor|style|docs|chore|perf)(\(.+\))?: ]]; then
              echo "❌ Invalid commit message: $msg"
              echo "   Must follow: type(scope): description"
              echo "   Example: feat(theme): add responsive header"
              exit 1
            fi
          done

          echo "✅ All commit messages are valid"

  summary:
    name: PR Check Summary
    runs-on: ubuntu-latest
    needs: [docker-validation, security-scan, pr-validation, commit-validation]
    if: always()

    steps:
      - name: Summary
        uses: actions/github-script@v7
        with:
          script: |
            const needs = ${{ toJSON(needs) }};
            let summary = '## 🔍 PR Quality Check Results\n\n';

            for (const [job, result] of Object.entries(needs)) {
              const icon = result.result === 'success' ? '✅' : '❌';
              summary += `${icon} **${job}**: ${result.result}\n`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });
