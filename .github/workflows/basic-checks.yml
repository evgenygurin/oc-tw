name: Basic Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master, main, develop]

jobs:
  validate:
    name: Validate Repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Basic Validation
        run: |
          echo "✅ Starting basic validation..."
          
          # Check if required files exist
          if [ -f ".cursorrules" ]; then
            echo "✅ Cursor rules file exists"
          else
            echo "ℹ️  Cursor rules file not found (this is OK)"
          fi
          
          if [ -d ".github" ]; then
            echo "✅ GitHub configuration directory exists"
          else
            echo "ℹ️  GitHub configuration directory not found"
          fi
          
          echo "✅ Basic validation completed successfully"

      - name: Check Files
        run: |
          echo "📁 Checking repository structure..."
          
          # List important files
          echo "Repository contents:"
          ls -la
          
          if [ -d "upload" ]; then
            echo "✅ OpenCart upload directory found"
          fi
          
          if [ -f "README.md" ]; then
            echo "✅ README.md exists"
          fi
          
          echo "✅ File check completed"