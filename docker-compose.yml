services:
  opencart:
    container_name: oc-tw-opencart
    build: .
    ports:
      - "8080:80"
    volumes:
      - opencart-data:/var/www/html
      - ./theme/oc-astro:/var/www/html/catalog/view/theme/oc-astro
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - TZ=UTC
      - OPENCART_ADMIN_USERNAME=admin
      - OPENCART_ADMIN_PASSWORD=admin123
      - OPENCART_ADMIN_EMAIL=admin@example.com
      - OPENCART_HTTP_SERVER=http://localhost:8080/
      - MYSQL_USER=opencart
      - MYSQL_PASSWORD=opencart_pass
      - MYSQL_DATABASE=opencart_db
    restart: unless-stopped
    networks:
      - oc-network

  mysql:
    container_name: oc-tw-mysql
    image: mariadb:10.11
    command: --skip-log-bin --innodb-use-native-aio=0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_secure_2025
      - MYSQL_DATABASE=opencart_db
      - MYSQL_USER=opencart
      - MYSQL_PASSWORD=opencart_pass
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - oc-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    container_name: oc-tw-adminer
    image: adminer:latest
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - oc-network

  mailhog:
    container_name: oc-tw-mailhog
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped
    networks:
      - oc-network

volumes:
  opencart-data:
    driver: local
  mysql-data:
    driver: local

networks:
  oc-network:
    driver: bridge
