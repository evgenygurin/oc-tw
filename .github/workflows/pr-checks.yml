name: PR Quality Checks

on:
  pull_request:
    branches: [ main, develop, codegen-bot/initial-setup ]
  pull_request_target:
    branches: [ main, develop, codegen-bot/initial-setup ]
    types: [ opened, synchronize, reopened ]

jobs:
  docker-validation:
    name: Docker Services Health
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cp .env.example .env
          sed -i 's/your_secure_root_password/test_password_123/g' .env
          sed -i 's/your_secure_password/test_db_pass_456/g' .env

      - name: Start Docker services
        run: docker compose up -d

      - name: Wait for services
        run: sleep 30

      - name: Check services health
        run: |
          docker compose ps
          docker compose ps | grep -q "healthy" || exit 1

      - name: Cleanup
        if: always()
        run: docker compose down -v

  security-scan:
    name: Security Vulnerabilities
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for secrets
        run: |
          # Scan filesystem for secrets (simpler approach)
          docker run --rm -v "${PWD}:/workdir" -w /workdir \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /workdir \
            --no-update \
            --github-actions \
            --exclude-paths /workdir/.git || echo "TruffleHog scan completed"

  pr-validation:
    name: PR Template Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            // Check if PR has description
            if (body.length < 50) {
              core.setFailed('PR description is too short. Please provide detailed description.');
              return;
            }

            // Check for WHY section
            if (!body.includes('WHY:')) {
              core.setFailed('PR must explain WHY the change was made.');
              return;
            }

            // Check for type classification
            const types = ['feat:', 'fix:', 'refactor:', 'style:', 'docs:', 'chore:', 'perf:'];
            const hasType = types.some(type => body.includes(`[x] \`${type}\``));

            if (!hasType) {
              core.setFailed('PR must have a type classification selected.');
              return;
            }

            core.info('✅ PR template properly filled');

      - name: Check branch naming
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if ! [[ "$BRANCH_NAME" =~ ^(feat|fix|refactor|style|docs|chore|perf)/.+ ]]; then
            echo "❌ Branch name must follow pattern: type/description"
            echo "   Examples: feat/user-auth, fix/mobile-menu"
            exit 1
          fi
          echo "✅ Branch name is valid: $BRANCH_NAME"

  commit-validation:
    name: Commit Message Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages  
        run: |
          # For pull_request events, we need to fetch the PR branch
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.event.pull_request.head.ref }}
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "pull_request_target" ]; then
            git fetch origin ${{ github.event.pull_request.head.ref }}
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            echo "✅ Event type ${{ github.event_name }} - skipping validation"
            exit 0
          fi
          
          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: $HEAD_SHA"
          echo "Validating commits between ${BASE_SHA} and ${HEAD_SHA}"
          
          # Get commit messages between base and head
          COMMITS=$(git log --format=%s ${BASE_SHA}..${HEAD_SHA} || echo "")

          if [ -z "$COMMITS" ]; then
            echo "✅ No commits to validate"
            exit 0
          fi

          echo "Validating commits:"
          echo "$COMMITS" | while read -r msg; do
            if [ -z "$msg" ]; then
              continue
            fi
            echo "Checking: $msg"
            if ! [[ "$msg" =~ ^(feat|fix|refactor|style|docs|chore|perf)(\(.+\))?: ]]; then
              echo "❌ Invalid commit message: $msg"
              echo "   Must follow: type(scope): description"
              echo "   Example: feat(theme): add responsive header"
              exit 1
            fi
          done

          echo "✅ All commit messages are valid"

  summary:
    name: PR Check Summary
    runs-on: ubuntu-latest
    needs: [docker-validation, security-scan, pr-validation, commit-validation]
    if: always()

    steps:
      - name: Summary
        uses: actions/github-script@v7
        with:
          script: |
            const needs = ${{ toJSON(needs) }};
            let summary = '## 🔍 PR Quality Check Results\n\n';

            for (const [job, result] of Object.entries(needs)) {
              const icon = result.result === 'success' ? '✅' : '❌';
              summary += `${icon} **${job}**: ${result.result}\n`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });
